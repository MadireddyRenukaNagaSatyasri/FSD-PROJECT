<!DOCTYPE html>
<html>
<head>
  <title>Image Frame Example</title>
  <style>
    /* Container / Frame */
    .card {
      width: 300px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
      overflow: hidden;
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    /* Image */
    .card img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="renuk.jpg" alt="Sample Image">
    <div class="description">
      <h3>Delicious Food</h3>
      <p>This is a description about the food shown in the image above.</p>
    </div>
  </div>

</body>
</html>
