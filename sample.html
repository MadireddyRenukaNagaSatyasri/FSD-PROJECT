<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Explorer - Clickable Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; background: #f0f2f5; font-family: sans-serif; }
        
        #map { 
            height: 100vh; 
            width: 100%; 
            background: white; 
        }

        /* The Lollipop Marker */
        .lollipop {
            width: 24px;
            height: 24px;
            background: #ff4757; /* Marker Color */
            border: 3px solid white;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: -2px 2px 10px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .lollipop:hover {
            background: #2ed573;
            transform: rotate(-45deg) scale(1.2);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Set boundaries to ONLY show India [South-West, North-East]
        const indiaBounds = [
            [6.5, 68.1], 
            [35.7, 97.4]
        ];

        // 2. Initialize map locked to these bounds
        const map = L.map('map', {
            maxBounds: indiaBounds,
            maxBoundsViscosity: 1.0, // Prevents user from dragging away from India
            minZoom: 5,
            zoomControl: true
        }).setView([22.5, 78.9], 5);

        // 3. Add colorful Voyager tiles (looks great for websites)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap',
            bounds: indiaBounds
        }).addTo(map);

        // 4. List of cities and their redirection links
        const locations = [
            { name: "New Delhi", lat: 28.6139, lng: 77.2090, url: "delhi-food.html" },
            { name: "Mumbai", lat: 19.0760, lng: 72.8777, url: "mumbai-food.html" },
            { name: "Bengaluru", lat: 12.9716, lng: 77.5946, url: "bengaluru-food.html" },
            { name: "Hyderabad", lat: 17.3850, lng: 78.4867, url: "hyderabad-food.html" },
            { name: "Kolkata", lat: 22.5726, lng: 88.3639, url: "kolkata-food.html" },
            { name: "Chennai", lat: 13.0827, lng: 80.2707, url: "chennai-food.html" }
        ];

        // 5. Custom Icon for the Lollipop
        const lollipopIcon = L.divIcon({
            className: 'custom-div-icon',
            html: `<div class="lollipop"></div>`,
            iconSize: [24, 24],
            iconAnchor: [12, 24] // Points the bottom tip of the lollipop to the city
        });

        // 6. Add markers with Click Logic
        locations.forEach(loc => {
            const marker = L.marker([loc.lat, loc.lng], { icon: lollipopIcon }).addTo(map);
            
            // Show city name on hover
            marker.bindTooltip(`<b>${loc.name}</b>`, { direction: 'top', offset: [0, -20] });

            // On click, move to the specific city page
            marker.on('click', function() {
                window.location.href = loc.url; 
            });
        });
    </script>
</body>
</html>
